basePath: /api/v1
definitions:
  models.Application:
    properties:
      id:
        type: string
      image:
        $ref: '#/definitions/models.Image'
      ip:
        type: string
      name:
        type: string
      port:
        type: integer
      status:
        description: calculado em tempo real, não persistido
        type: string
      tags:
        items:
          type: string
        type: array
      url:
        type: string
    type: object
  models.DiscoverResult:
    properties:
      discovered:
        items:
          $ref: '#/definitions/models.DiscoveredApplication'
        type: array
      total:
        type: integer
    type: object
  models.DiscoveredApplication:
    properties:
      container:
        type: string
      ip:
        type: string
      name:
        type: string
      port:
        type: integer
      tags:
        items:
          type: string
        type: array
    type: object
  models.Image:
    properties:
      height:
        type: integer
      name:
        type: string
      size:
        type: integer
      width:
        type: integer
    type: object
  models.ListApplicationsResult:
    properties:
      applications:
        items:
          $ref: '#/definitions/models.Application'
        type: array
      total:
        type: integer
    type: object
host: localhost:8000
info:
  contact: {}
  description: Documentação da API Home Server Hub
  title: Home Server Hub API
  version: "0.1"
paths:
  /applications:
    get:
      description: Retorna todas as aplicações já criadas e armazenadas no sistema
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ListApplicationsResult'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Lista aplicações
      tags:
      - applications
  /applications/:
    post:
      consumes:
      - multipart/form-data
      description: Cria e armazena uma aplicação com base no ID de um container Docker
        e dados opcionais enviados via multipart/form-data
      parameters:
      - description: ID do container Docker
        in: query
        name: container_id
        required: true
        type: string
      - description: Nome personalizado da aplicação
        in: formData
        name: name
        type: string
      - description: Porta a ser exposta
        format: int32
        in: formData
        name: port
        type: integer
      - description: URL pública da aplicação
        in: formData
        name: url
        type: string
      - collectionFormat: multi
        description: Tags da aplicação (múltiplas ocorrências do campo)
        in: formData
        items:
          type: string
        name: tags
        type: array
      - description: Imagem opcional para representar a aplicação
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Application'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cria uma nova aplicação
      tags:
      - applications
  /applications/{id}:
    delete:
      parameters:
      - description: ID da aplicação
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Remove uma aplicação
      tags:
      - applications
    get:
      parameters:
      - description: ID da aplicação
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Application'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Retorna uma aplicação
      tags:
      - applications
    put:
      consumes:
      - multipart/form-data
      description: Aceita os mesmos campos do POST via multipart/form-data; apenas
        os campos enviados são atualizados.
      parameters:
      - description: ID da aplicação
        in: path
        name: id
        required: true
        type: string
      - description: Novo nome
        in: formData
        name: name
        type: string
      - description: Nova porta
        format: int32
        in: formData
        name: port
        type: integer
      - description: Nova URL
        in: formData
        name: url
        type: string
      - collectionFormat: multi
        description: Novas tags (substitui as existentes; envie sem valor para limpar)
        in: formData
        items:
          type: string
        name: tags
        type: array
      - description: Nova imagem
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Application'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Atualiza uma aplicação
      tags:
      - applications
  /applications/{id}/image:
    get:
      parameters:
      - description: ID da aplicação
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Retorna a imagem de uma aplicação
      tags:
      - applications
  /applications/{id}/restart:
    post:
      parameters:
      - description: ID da aplicação
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Application'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reinicia o container de uma aplicação
      tags:
      - applications
  /applications/{id}/start:
    post:
      parameters:
      - description: ID da aplicação
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Application'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Inicia o container de uma aplicação
      tags:
      - applications
  /applications/{id}/stop:
    post:
      parameters:
      - description: ID da aplicação
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Application'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Para o container de uma aplicação
      tags:
      - applications
  /applications/discover:
    get:
      consumes:
      - application/json
      description: Busca por containers Docker em execução e retorna como aplicações
        potenciais
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DiscoverResult'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Descobre aplicações Docker rodando no servidor
      tags:
      - applications
  /applications/events:
    get:
      description: 'Conexão Server-Sent Events que emite `data: {"id":"<app-id>","status":"running"|"stopped"}`
        toda vez que um container associado a uma aplicação muda de estado. Pings
        de keep-alive (`: ping`) são enviados a cada 25s.'
      produces:
      - text/event-stream
      responses:
        "200":
          description: stream de eventos
          schema:
            type: string
      summary: Stream SSE de atualizações de status
      tags:
      - applications
swagger: "2.0"
