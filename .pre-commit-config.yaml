repos:
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-commit]

      - id: go-unit-tests
        name: go-unit-tests
        entry: go test ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-push]
